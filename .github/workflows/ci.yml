name: CI

on:
  push:
    branches: [main, "hardening/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ── Lint & Type check ──────────────────────────────────────────
  lint:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0
        continue-on-error: true  # Passer en error une fois le linting nettoyé

  # ── Build ──────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    env:
      # Variables factices pour que le build passe sans Supabase réel
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
      NEXT_PUBLIC_DEFAULT_TENANT_SLUG: m3a
      SUPERADMIN_KEY: ci-placeholder-key-for-build-only
      NEXT_PUBLIC_SENTRY_DSN: ""
      SENTRY_ORG: ""
      SENTRY_PROJECT: ""
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ── Security audit ─────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true  # Ne pas bloquer tant que les vulnérabilités ne sont pas corrigées
